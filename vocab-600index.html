<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>600 Từ Vựng C1-C2 | THPT & ĐGNL 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0f0e0c; --cream:#f5f0e8; --warm:#ede5d0;
  --accent:#c8401a; --accent2:#2a6b4a; --gold:#b8963c;
  --muted:#7a7268; --card:#faf7f2; --border:#d4c9b0;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh}

/* HEADER */
header{background:var(--ink);color:var(--cream);padding:1.4rem 1.5rem 1.1rem;position:relative}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--gold),var(--accent2))}
.hdr{max-width:980px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:.5rem}
.hlabel{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:.25rem}
header h1{font-family:'Playfair Display',serif;font-size:clamp(1.3rem,3vw,1.9rem);font-weight:900;line-height:1.1}
header h1 em{color:var(--accent);font-style:normal}
.hright{text-align:right;font-size:.75rem;color:#9a9080;line-height:1.7}
.hright strong{color:var(--gold)}

/* NAV TABS */
.tabs{background:var(--warm);border-bottom:2px solid var(--border)}
.tabs-inner{max-width:980px;margin:0 auto;padding:0 1.2rem;display:flex;gap:0}
.tab{padding:.7rem 1.1rem;font-size:.83rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--muted);transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--ink)}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

/* CONTROLS */
.controls{max-width:980px;margin:1rem auto .6rem;padding:0 1.2rem;display:flex;flex-wrap:wrap;gap:.55rem;align-items:center}
.srch{flex:1;min-width:170px;position:relative}
.srch input{width:100%;padding:.55rem .9rem .55rem 2.1rem;border:1.5px solid var(--border);border-radius:6px;background:var(--card);font-family:'DM Sans',sans-serif;font-size:.86rem;color:var(--ink);outline:none;transition:border-color .2s}
.srch input:focus{border-color:var(--accent)}
.srch::before{content:'🔍';position:absolute;left:.65rem;top:50%;transform:translateY(-55%);font-size:.75rem;pointer-events:none}
.btn{padding:.48rem .9rem;border:1.5px solid var(--border);border-radius:6px;background:var(--card);font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .15s;color:var(--ink);white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.on{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.btn-r{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-r:hover{background:#a53315;border-color:#a53315;color:#fff}
.btn-g{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.btn-g:hover{background:#1e5237;border-color:#1e5237;color:#fff}

/* STATS */
.stats{max-width:980px;margin:0 auto .8rem;padding:0 1.2rem;display:flex;gap:1.2rem;align-items:center;font-family:'Space Mono',monospace;font-size:.72rem;color:var(--muted)}
.stats strong{color:var(--ink)}
.pbar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;min-width:60px}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:2px;transition:width .3s}

/* ===== FLASHCARD MODE ===== */
#m-flash{display:block}
.flash-wrap{max-width:560px;margin:0 auto;padding:0 1.2rem 3rem}
.flash-counter{text-align:center;font-family:'Space Mono',monospace;font-size:.72rem;color:var(--muted);margin:.8rem 0 .5rem}
.flash-card{
  background:var(--card);border:1.5px solid var(--border);border-radius:14px;
  min-height:280px;cursor:pointer;perspective:1000px;margin-bottom:1rem;
  box-shadow:0 4px 24px rgba(15,14,12,.09);
  position:relative;
}
.flash-inner{
  width:100%;height:100%;min-height:280px;
  position:relative;transform-style:preserve-3d;
  transition:transform .45s cubic-bezier(.4,0,.2,1);
}
.flash-card.flipped .flash-inner{transform:rotateY(180deg)}
.flash-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem 1.5rem;border-radius:13px;
}
.flash-front{background:var(--card)}
.flash-back{background:var(--ink);color:var(--cream);transform:rotateY(180deg);border-radius:13px}
.flash-word{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,5vw,2.6rem);font-weight:900;text-align:center;margin-bottom:.4rem}
.flash-pos{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.6rem}
.flash-ipa{font-size:1rem;color:var(--muted);margin-bottom:.4rem}
.flash-level{display:inline-block;padding:.2rem .7rem;border-radius:20px;font-family:'Space Mono',monospace;font-size:.68rem;font-weight:700;letter-spacing:.05em}
.lv-c1{background:#e8f0eb;color:var(--accent2)}
.lv-c2{background:#fdf0eb;color:var(--accent)}
.lv-b{background:#fef8e7;color:var(--gold)}
.flash-hint{font-size:.75rem;color:#9a9080;margin-top:1rem;font-style:italic}

.flash-vi{font-size:1.15rem;font-weight:500;text-align:center;margin-bottom:.8rem;color:var(--cream)}
.flash-syn-label{font-family:'Space Mono',monospace;font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:#a09080;margin-bottom:.25rem}
.flash-syn{font-size:.82rem;color:#d4c9b0;text-align:center;margin-bottom:.6rem}
.flash-ant{font-size:.82rem;color:#e09070;text-align:center}

.flash-nav{display:flex;justify-content:center;gap:.7rem;flex-wrap:wrap;margin-bottom:.8rem}
.flash-rating{display:flex;justify-content:center;gap:.5rem;flex-wrap:wrap}
.rbt{padding:.5rem 1.2rem;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s}
.rbt-easy{background:#dcf0e3;color:var(--accent2)}
.rbt-easy:hover{background:#c0e6cc}
.rbt-hard{background:#fde8e0;color:var(--accent)}
.rbt-hard:hover{background:#fbd0c2}
.rbt-skip{background:var(--warm);color:var(--muted)}
.rbt-skip:hover{background:var(--border)}

/* ===== LIST MODE ===== */
#m-list{display:none}
.list-wrap{max-width:980px;margin:0 auto;padding:0 1.2rem 3rem}
.list-grid{display:grid;gap:.45rem}
.list-row{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:.65rem 1rem;display:grid;
  grid-template-columns:2rem 1fr 1fr 3rem 1fr 3rem;
  gap:.5rem;align-items:center;font-size:.83rem;
  transition:background .12s;
}
.list-row:hover{background:var(--warm)}
.list-num{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--muted)}
.list-word{font-weight:600;font-family:'DM Sans',sans-serif}
.list-vi{color:var(--muted);font-size:.8rem}
.list-ipa{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--muted)}
.list-syn{font-size:.75rem;color:var(--accent2)}
.list-hdr{
  background:var(--ink);color:var(--cream);border-radius:8px;
  padding:.5rem 1rem;display:grid;
  grid-template-columns:2rem 1fr 1fr 3rem 1fr 3rem;
  gap:.5rem;font-family:'Space Mono',monospace;font-size:.65rem;
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:.3rem;
}
.known-dot{width:10px;height:10px;border-radius:50%;background:var(--border);display:inline-block;cursor:pointer;transition:background .15s}
.known-dot.yes{background:var(--accent2)}

/* ===== QUIZ MODE ===== */
#m-quiz{display:none}
.quiz-wrap{max-width:580px;margin:0 auto;padding:0 1.2rem 3rem}
.quiz-q{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:1.8rem 1.5rem;margin-bottom:1rem;text-align:center;box-shadow:0 2px 12px rgba(15,14,12,.07)}
.quiz-label{font-family:'Space Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:.8rem}
.quiz-word{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:900;margin-bottom:.4rem}
.quiz-ipa{font-size:.9rem;color:var(--muted);margin-bottom:.5rem}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.8rem}
.qopt{padding:.9rem;border:1.5px solid var(--border);border-radius:8px;background:var(--card);font-family:'DM Sans',sans-serif;font-size:.88rem;cursor:pointer;transition:all .15s;text-align:left;line-height:1.35}
.qopt:hover:not(:disabled){border-color:var(--gold);background:var(--warm)}
.qopt.correct{border-color:var(--accent2);background:#e8f5ee;color:var(--accent2);font-weight:600}
.qopt.wrong{border-color:var(--accent);background:#fde8e0;color:var(--accent)}
.qopt:disabled{cursor:default}
.quiz-result{text-align:center;font-size:.9rem;min-height:1.4rem;font-weight:500;color:var(--accent2)}
.quiz-result.bad{color:var(--accent)}
.quiz-score{font-family:'Space Mono',monospace;font-size:.75rem;text-align:center;color:var(--muted);margin-bottom:.6rem}
.quiz-score strong{color:var(--ink)}

/* EMPTY */
.empty{text-align:center;padding:4rem 2rem;color:var(--muted);font-style:italic}

/* RESPONSIVE */
@media(max-width:640px){
  .list-row,.list-hdr{grid-template-columns:1.5rem 1fr 1fr 2.5rem}
  .list-ipa,.list-syn{display:none}
  .quiz-opts{grid-template-columns:1fr}
}
</style>
</head>

<header>
  <div class="hdr">

      <div class="hlabel">THPT Quốc Gia & ĐGNL 2026</div>
      <h1><em>600</em> Từ Vựng Nâng Cao C1–C2</h1>
    </div>
    <div class="hright">
      Cô Vũ Thị Mai Phương<br>
      <strong id="known-count">0</strong> / <span id="total-count">600</span> đã thuộc
    </div>
  </div>
</header>

<div class="tabs">
  <div class="tabs-inner">
    <div class="tab on" onclick="switchMode('flash',this)">🃏 Flashcard</div>
    <div class="tab" onclick="switchMode('list',this)">📋 Danh sách</div>
    <div class="tab" onclick="switchMode('quiz',this)">✏️ Quiz</div>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="srch">
    <input type="text" id="search" placeholder="Tìm từ vựng..." oninput="applyFilters()">
  </div>
  <button class="btn on" onclick="filterLevel('all',this)">Tất cả</button>
  <button class="btn" onclick="filterLevel('C1',this)">C1</button>
  <button class="btn" onclick="filterLevel('C2',this)">C2</button>
  <button class="btn" onclick="filterKnown('unknown',this)">Chưa thuộc</button>
  <button class="btn" onclick="filterKnown('known',this)">Đã thuộc</button>
  <button class="btn btn-r" onclick="shuffleWords()">🔀 Xáo trộn</button>
  <button class="btn btn-g" onclick="resetKnown()">↺ Reset</button>
</div>

<div class="stats">
  <span>Hiển thị: <strong id="showing">600</strong></span>
  <div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
  <span>Tiến độ: <strong id="pct">0%</strong></span>
</div>

<!-- ===== FLASHCARD MODE ===== -->
<div id="m-flash">
  <div class="flash-wrap">
    <div class="flash-counter" id="fc-counter">1 / 600</div>
    <div class="flash-card" id="flashcard" onclick="flipCard()">
      <div class="flash-inner" id="flash-inner">
        <div class="flash-face flash-front" id="ff-front">
          <div class="flash-pos" id="ff-pos"></div>
          <div class="flash-word" id="ff-word">—</div>
          <div class="flash-ipa" id="ff-ipa"></div>
          <div id="ff-level"></div>
          <div class="flash-hint">Nhấn để xem nghĩa</div>
        </div>
        <div class="flash-face flash-back" id="ff-back">
          <div class="flash-vi" id="fb-vi"></div>
          <div class="flash-syn-label">Từ đồng nghĩa</div>
          <div class="flash-syn" id="fb-syn"></div>
          <div class="flash-syn-label" style="margin-top:.5rem">Từ trái nghĩa</div>
          <div class="flash-ant" id="fb-ant"></div>
        </div>
      </div>
    </div>
    <div class="flash-nav">
      <button class="btn" onclick="prevCard()">← Trước</button>
      <button class="btn btn-r" onclick="flipCard()">↩ Lật thẻ</button>
      <button class="btn" onclick="nextCard()">Tiếp →</button>
    </div>
    <div class="flash-rating">
      <button class="rbt rbt-hard" onclick="rateCard(false)">✗ Chưa thuộc</button>
      <button class="rbt rbt-skip" onclick="nextCard()">→ Bỏ qua</button>
      <button class="rbt rbt-easy" onclick="rateCard(true)">✓ Đã thuộc</button>
    </div>
  </div>
</div>

<!-- ===== LIST MODE ===== -->
<div id="m-list">
  <div class="list-wrap">
    <div class="list-hdr">
      <span>#</span><span>Từ vựng</span><span>Nghĩa</span><span>IPA</span><span>Đồng nghĩa</span><span>Cấp</span>
    </div>
    <div class="list-grid" id="list-grid"></div>
  </div>
</div>

<!-- ===== QUIZ MODE ===== -->
<div id="m-quiz">
  <div class="quiz-wrap">
    <div class="quiz-score">Đúng: <strong id="q-correct">0</strong> / <strong id="q-total">0</strong></div>
    <div class="quiz-q">
      <div class="quiz-label">Chọn nghĩa đúng của từ</div>
      <div class="quiz-word" id="q-word">—</div>
      <div class="quiz-ipa" id="q-ipa"></div>
      <div id="q-pos" style="font-size:.78rem;color:var(--muted);margin-bottom:.5rem"></div>
    </div>
    <div class="quiz-opts" id="q-opts"></div>
    <div class="quiz-result" id="q-result"></div>
    <div style="text-align:center;margin-top:.8rem">
      <button class="btn btn-r" id="q-next" onclick="nextQuiz()" style="display:none">Câu tiếp →</button>
    </div>
  </div>
</div>

// Build word objects
const WORDS = RAW.map(r => ({
  num: r[0], word: r[1], vi: r[2], pos: r[3],
  ipa: r[4], level: r[5], syn: r[6], ant: r[7],
  known: false
}));

// State
let filtered = [...WORDS];
let flashIdx = 0;
let levelFilter = 'all';
let knownFilter = 'all';
let searchQ = '';
let quizCorrect = 0;
let quizTotal = 0;
let quizAnswered = false;
let currentMode = 'flash';

// ======== FILTERS ========
function applyFilters() {
  searchQ = document.getElementById('search').value.toLowerCase();
  filtered = WORDS.filter(w => {
    const lv = levelFilter === 'all' || w.level === levelFilter;
    const kn = knownFilter === 'all' || (knownFilter === 'known' ? w.known : !w.known);
    const sr = !searchQ || w.word.toLowerCase().includes(searchQ) || w.vi.toLowerCase().includes(searchQ);
    return lv && kn && sr;
  });
  flashIdx = 0;
  document.getElementById('showing').textContent = filtered.length;
  if (currentMode === 'flash') renderFlash();
  else if (currentMode === 'list') renderList();
  else renderQuiz();
}

function filterLevel(lv, btn) {
  levelFilter = lv;
  document.querySelectorAll('.btn').forEach(b => {
    if (['Tất cả','C1','C2'].includes(b.textContent.trim())) b.classList.remove('on');
  });
  btn.classList.add('on');
  applyFilters();
}

function filterKnown(k, btn) {
  knownFilter = knownFilter === k ? 'all' : k;
  btn.classList.toggle('on');
  applyFilters();
}

function shuffleWords() {
  filtered.sort(() => Math.random() - 0.5);
  flashIdx = 0;
  if (currentMode === 'flash') renderFlash();
  else if (currentMode === 'list') renderList();
}

function resetKnown() {
  WORDS.forEach(w => w.known = false);
  updateKnownUI();
  applyFilters();
}

function updateKnownUI() {
  const cnt = WORDS.filter(w => w.known).length;
  document.getElementById('known-count').textContent = cnt;
  const pct = Math.round(cnt / WORDS.length * 100);
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('pfill').style.width = pct + '%';
}

// ======== FLASHCARD MODE ========
function renderFlash() {
  const card = document.getElementById('flashcard');
  card.classList.remove('flipped');
  if (!filtered.length) {
    document.getElementById('ff-word').textContent = '—';
    document.getElementById('fc-counter').textContent = '0 / 0';
    return;
  }
  const w = filtered[flashIdx];
  document.getElementById('fc-counter').textContent = `${flashIdx + 1} / ${filtered.length}`;
  document.getElementById('ff-word').textContent = w.word;
  document.getElementById('ff-pos').textContent = w.pos;
  document.getElementById('ff-ipa').textContent = w.ipa;
  const lvEl = document.getElementById('ff-level');
  lvEl.innerHTML = `<span class="flash-level ${w.level.startsWith("C2")?"lv-c2":w.level.startsWith("C1")?"lv-c1":"lv-b"}</span>`;
  document.getElementById('fb-vi').textContent = w.vi;
  document.getElementById('fb-syn').textContent = w.syn || '—';
  document.getElementById('fb-ant').textContent = w.ant || '—';
}

function flipCard() {
  document.getElementById('flashcard').classList.toggle('flipped');
}

function prevCard() {
  if (!filtered.length) return;
  flashIdx = (flashIdx - 1 + filtered.length) % filtered.length;
  renderFlash();
}

function nextCard() {
  if (!filtered.length) return;
  flashIdx = (flashIdx + 1) % filtered.length;
  renderFlash();
}

function rateCard(isKnown) {
  if (!filtered.length) return;
  filtered[flashIdx].known = isKnown;
  const orig = WORDS.find(w => w.word === filtered[flashIdx].word && w.num === filtered[flashIdx].num);
  if (orig) orig.known = isKnown;
  updateKnownUI();
  nextCard();
}

// ======== LIST MODE ========
function renderList() {
  const grid = document.getElementById('list-grid');
  if (!filtered.length) { grid.innerHTML = '<div class="empty">Không tìm thấy từ nào.</div>'; return; }
  grid.innerHTML = filtered.map((w,i) => `
    <div class="list-row">
      <span class="list-num">${w.num}</span>
      <span class="list-word">${w.word} <span style="font-family:'Space Mono',monospace;font-size:.65rem;color:var(--muted);font-weight:400">${w.pos}</span></span>
      <span class="list-vi">${w.vi}</span>
      <span class="list-ipa">${w.ipa}</span>
      <span class="list-syn">${w.syn || ''}</span>
      <span style="display:flex;align-items:center;gap:.4rem">
        <span class="flash-level lv-${w.level.toLowerCase()}" style="font-size:.6rem;padding:.15rem .5rem">${w.level}</span>
        <span class="known-dot ${w.known?'yes':''}" title="Đánh dấu thuộc" onclick="toggleKnown(${i})"></span>
      </span>
    </div>
  `).join('');
}

function toggleKnown(idx) {
  filtered[idx].known = !filtered[idx].known;
  const orig = WORDS.find(w => w.word === filtered[idx].word && w.num === filtered[idx].num);
  if (orig) orig.known = filtered[idx].known;
  updateKnownUI();
  renderList();
}

// ======== QUIZ MODE ========
function renderQuiz() {
  if (filtered.length < 4) {
    document.getElementById('q-opts').innerHTML = '<div class="empty">Cần ít nhất 4 từ để làm quiz.</div>';
    return;
  }
  const w = filtered[Math.floor(Math.random() * filtered.length)];
  document.getElementById('q-word').textContent = w.word;
  document.getElementById('q-ipa').textContent = w.ipa;
  document.getElementById('q-pos').textContent = w.pos;

  // 4 options
  const wrongs = WORDS.filter(x => x.word !== w.word).sort(() => Math.random() - .5).slice(0,3);
  const opts = [w, ...wrongs].sort(() => Math.random() - .5);

  document.getElementById('q-opts').innerHTML = opts.map((o,i) => `
    <button class="qopt" onclick="checkQuiz(this,'${o.word}','${w.word}')">${o.vi}</button>
  `).join('');
  document.getElementById('q-result').textContent = '';
  document.getElementById('q-result').className = 'quiz-result';
  document.getElementById('q-next').style.display = 'none';
  quizAnswered = false;
}

function checkQuiz(btn, chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true;
  quizTotal++;
  const allOpts = document.querySelectorAll('.qopt');
  allOpts.forEach(b => b.disabled = true);

  if (chosen === correct) {
    btn.classList.add('correct');
    document.getElementById('q-result').textContent = '✓ Chính xác!';
    quizCorrect++;
  } else {
    btn.classList.add('wrong');
    document.getElementById('q-result').textContent = `✗ Sai! Đáp án: "${WORDS.find(w=>w.word===correct)?.vi}"`;
    document.getElementById('q-result').classList.add('bad');
  }
  document.getElementById('q-correct').textContent = quizCorrect;
  document.getElementById('q-total').textContent = quizTotal;
  document.getElementById('q-next').style.display = 'inline-block';
}

function nextQuiz() { renderQuiz(); }

// ======== MODE SWITCHING ========
function switchMode(mode, el) {
  currentMode = mode;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('m-flash').style.display = mode === 'flash' ? 'block' : 'none';
  document.getElementById('m-list').style.display = mode === 'list' ? 'block' : 'none';
  document.getElementById('m-quiz').style.display = mode === 'quiz' ? 'block' : 'none';
  if (mode === 'flash') renderFlash();
  else if (mode === 'list') renderList();
  else renderQuiz();
}

// ======== KEYBOARD ========
document.addEventListener('keydown', e => {
  if (currentMode !== 'flash') return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextCard(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prevCard(); }
  else if (e.key === 'f' || e.key === 'F') flipCard();
  else if (e.key === '1') rateCard(false);
  else if (e.key === '3') rateCard(true);
});

// INIT - wrap in DOMContentLoaded to ensure DOM is ready
function init() {
  document.getElementById('total-count').textContent = WORDS.length;
  document.getElementById('showing').textContent = WORDS.length;
  renderFlash();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>
